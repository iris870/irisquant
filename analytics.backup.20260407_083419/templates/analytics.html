<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>IrisQuant - 账户表现 analysis</title>
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 background: #0a0e27;
 font-family: 'JetBrains Mono', monospace;
 color: #e0e0e0;
 padding: 20px;
 }
 .card {
 background: #11162e;
 border: 1px solid #2a2e4a;
 border-radius: 12px;
 padding: 20px;
 transition: all 0.3s;
 }
 .card:hover {
 border-color: #00d4ff;
 box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
 }
 .positive { color: #00ff88; }
 .negative { color: #ff4444; }
 .stat-value { font-size: 28px; font-weight: bold; margin-top: 8px; }
 .stat-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
 .navbar {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 30px;
 padding-bottom: 15px;
 border-bottom: 1px solid #2a2e4a;
 }
 .nav-links {
 display: flex;
 gap: 20px;
 }
 .nav-link {
 color: #888;
 text-decoration: none;
 padding: 8px 16px;
 border-radius: 8px;
 transition: all 0.3s;
 }
 .nav-link:hover, .nav-link.active {
 background: #1a1e3a;
 color: #00d4ff;
 }
 .mode-switch {
 background: #11162e;
 border-radius: 40px;
 padding: 4px;
 display: inline-flex;
 border: 1px solid #2a2e4a;
 margin-bottom: 20px;
 }
 .mode-option {
 padding: 8px 20px;
 border-radius: 32px;
 cursor: pointer;
 font-size: 14px;
 font-weight: bold;
 transition: all 0.3s;
 background: transparent;
 color: #888;
 }
 .mode-option.active {
 background: #00d4ff;
 color: #0a0e27;
 }
 .account-tabs {
 display: flex;
 flex-wrap: wrap;
 gap: 10px;
 margin: 20px 0;
 }
 .account-tab {
 background: #11162e;
 border: 1px solid #2a2e4a;
 border-radius: 8px;
 padding: 6px 12px;
 cursor: pointer;
 font-size: 11px;
 transition: all 0.3s;
 }
 .account-tab:hover, .account-tab.active {
 background: #00d4ff;
 color: #0a0e27;
 border-color: #00d4ff;
 }
 .stats-row {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 20px;
 margin-bottom: 30px;
 }
 .two-columns {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 margin-bottom: 30px;
 }
 .chart-container {
 height: 300px;
 position: relative;
 }
 table {
 width: 100%;
 border-collapse: collapse;
 }
 th, td {
 padding: 12px;
 text-align: left;
 border-bottom: 1px solid #2a2e4a;
 }
 th {
 color: #888;
 font-weight: normal;
 font-size: 12px;
 }
 .progress-bar {
 background: #2a2e4a;
 border-radius: 10px;
 height: 20px;
 overflow: hidden;
 flex: 1;
 }
 .progress-fill {
 background: #ff4444;
 height: 100%;
 width: 0%;
 transition: width 0.3s;
 border-radius: 10px;
 }
 .risk-item {
 display: flex;
 align-items: center;
 gap: 15px;
 margin-bottom: 15px;
 flex-wrap: wrap;
 }
 .risk-name {
 width: 380px;
 font-size: 11px;
 }
 .status-badge {
 padding: 2px 8px;
 border-radius: 12px;
 font-size: 10px;
 }
 .status-green { background: #00ff8822; color: #00ff88; }
 .status-red { background: #ff444422; color: #ff4444; }
 .sim-badge {
 background: #00d4ff22;
 color: #00d4ff;
 padding: 2px 8px;
 border-radius: 12px;
 font-size: 10px;
 }
 .refresh-time {
 text-align: right;
 color: #555;
 font-size: 11px;
 margin-top: 20px;
 }
 .account-card {
 background: #11162e;
 border-radius: 12px;
 padding: 16px;
 border-left: 4px solid;
 }
 .account-balance {
 font-size: 24px;
 font-weight: bold;
 margin: 8px 0;
 }
 @media (max-width: 1200px) {
 .risk-name { width: 260px; }
 .stats-row { grid-template-columns: repeat(2, 1fr); }
 .two-columns { grid-template-columns: 1fr; }
 }
 </style>
</head>
<body>
 <div class="max-w-7xl mx-auto">
 <!-- 导航栏 -->
 <div class="navbar">
 <div>
 <h1 class="text-2xl font-bold text-emerald-500">IrisQuant</h1>
 <p class="text-xs text-zinc-500">v2.1 | 多账户交易系统</p>
 </div>
 <div class="nav-links">
 <a href="/" class="nav-link">📡 实时看板</a>
 <a href="/analytics" class="nav-link active">📊 账户表现</a>
 </div>
 </div>

 <!-- 模式切换 -->
 <div class="mode-switch">
 <span class="mode-option sim active" data-mode="sim">🔵 模拟账户</span>
 <span class="mode-option real" data-mode="real">🔴 真实账户</span>
 </div>

 <!-- 账户切换标签 -->
 <div class="account-tabs" id="account-tabs">
 <div class="account-tab active" data-account="">📊 全部账户</div>
 </div>

 <!-- 统计卡片 -->
 <div class="stats-row" id="stats-row">
 <div class="card"><div class="stat-label">💰 总净值</div><div class="stat-value" id="total-equity">--</div></div>
 <div class="card"><div class="stat-label">📈 今日盈亏</div><div class="stat-value" id="total-pnl">--</div></div>
 <div class="card"><div class="stat-label">🏆 整体胜率</div><div class="stat-value" id="win-rate">--</div></div>
 <div class="card"><div class="stat-label">📉 最大回撤</div><div class="stat-value" id="max-drawdown">--</div></div>
 </div>

 <!-- 四个账户卡片 -->
 <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="accounts-grid"></div>

 <!-- 资金曲线 -->
 <div class="card mb-8">
 <div class="card-header text-emerald-500 font-bold mb-4">📈 资金曲线（四条账户曲线叠加）</div>
 <div class="chart-container">
 <canvas id="equityChart"></canvas>
 </div>
 </div>

 <!-- 两列布局 -->
 <div class="two-columns">
 <div class="card">
 <div class="card-header text-emerald-500 font-bold mb-4">📊 每日盈亏</div>
 <div class="chart-container" style="height: 250px;">
 <canvas id="dailyPnlChart"></canvas>
 </div>
 </div>
 <div class="card">
 <div class="card-header text-emerald-500 font-bold mb-4">🎯 盈亏分布</div>
 <div class="chart-container" style="height: 250px;">
 <canvas id="distributionChart"></canvas>
 </div>
 </div>
 </div>

 <!-- 交易记录表 -->
 <div class="card mb-8">
 <div class="card-header text-emerald-500 font-bold mb-4">📋 交易记录表（按时间倒序）</div>
 <div style="overflow-x: auto;">
 <table id="trades-table">
 <thead>
 <tr><th>时间</th><th>账户名称</th><th>市场</th><th>方向</th><th>金额</th><th>盈亏</th><th>状态</th></tr>
 </thead>
 <tbody id="trades-tbody"><tr><td colspan="7" class="text-center text-zinc-500">加载中...</td></tr></tbody>
 </table>
 </div>
 </div>

 <!-- 风控状态 -->
 <div class="card">
 <div class="card-header text-emerald-500 font-bold mb-4">🛡️ 风控状态</div>
 <div id="risk-container"></div>
 </div>

 <div class="refresh-time" id="refresh-time">最后更新: --</div>
 </div>

 <script>
 let equityChart, dailyPnlChart, distributionChart;
 let currentMode = 'sim';

 // 账户名称映射
 const ACCOUNT_NAMES = {
 "BINANCE_MAIN": "ACCOUNT BINANCE_MAIN BALANCE (btc-rolling)",
 "OKX_SUB1": "ACCOUNT OKX_SUB1 BALANCE (contract-trader)",
 "POLYMARKET": "ACCOUNT POLYMARKET BALANCE (polymarket)",
 "WEATHER_ALPHA": "ACCOUNT WEATHER_ALPHA BALANCE (weather-alpha-bot)"
 };

 const ACCOUNT_COLORS = {
 "BINANCE_MAIN": "#3b82f6",
 "OKX_SUB1": "#10b981",
 "POLYMARKET": "#f59e0b",
 "WEATHER_ALPHA": "#ef4444"
 };

 // 切换模式
 document.querySelectorAll('.mode-option').forEach(opt => {
 opt.addEventListener('click', () => {
 document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('active'));
 opt.classList.add('active');
 currentMode = opt.dataset.mode;
 refreshDashboard();
 });
 });

 async function fetchAPI(endpoint) {
 try {
 const res = await fetch(`/api/analytics/${endpoint}`);
 if (!res.ok) throw new Error(`HTTP ${res.status}`);
 return await res.json();
 } catch(e) {
 console.error(`API Error (${endpoint}):`, e);
 return null;
 }
 }

 async function refreshDashboard() {
 // 获取账户数据
 const accounts = await fetchAPI('accounts');
 if (accounts) {
 const container = document.getElementById('accounts-grid');
 container.innerHTML = accounts.map(acc => `
 <div class="account-card" style="border-left-color: ${acc.color}">
 <div class="text-xs text-zinc-500">${acc.name}</div>
 <div class="account-balance">$${acc.balance.toLocaleString()}</div>
 <div class="flex justify-between text-sm mt-2">
 <span class="text-zinc-500">今日盈亏</span>
 <span class="${acc.daily_pnl >= 0 ? 'positive' : 'negative'}">
 ${acc.daily_pnl >= 0 ? '+' : ''}$${acc.daily_pnl.toFixed(2)}
 </span>
 </div>
 </div>
 `).join('');
 }

 // 汇总统计
 const summary = await fetchAPI('summary');
 if (summary) {
 document.getElementById('total-equity').innerHTML = `$${summary.total_equity?.toLocaleString() || '0'}`;
 const pnlClass = (summary.total_pnl || 0) >= 0 ? 'positive' : 'negative';
 document.getElementById('total-pnl').innerHTML = `<span class="${pnlClass}">${(summary.total_pnl || 0) >= 0 ? '+' : ''}$${(summary.total_pnl || 0).toFixed(2)}</span>`;
 document.getElementById('win-rate').innerHTML = `${((summary.win_rate || 0) * 100).toFixed(1)}%`;
 document.getElementById('max-drawdown').innerHTML = `${((summary.max_drawdown || 0) * 100).toFixed(1)}%`;
 }

 // 资金曲线
 const equity = await fetchAPI('equity');
 if (equity && equity.length) {
 if (equityChart) equityChart.destroy();
 const ctx = document.getElementById('equityChart').getContext('2d');
 equityChart = new Chart(ctx, {
 type: 'line',
 data: {
 labels: equity.map(p => p.time),
 datasets: [{
 label: '账户净值',
 data: equity.map(p => p.equity),
 borderColor: '#00d4ff',
 backgroundColor: 'rgba(0, 212, 255, 0.1)',
 fill: true,
 tension: 0.3
 }]
 },
 options: { responsive: true, maintainAspectRatio: false }
 });
 }

 // 每日盈亏
 const daily = await fetchAPI('daily');
 if (daily && daily.length) {
 if (dailyPnlChart) dailyPnlChart.destroy();
 const ctx = document.getElementById('dailyPnlChart').getContext('2d');
 dailyPnlChart = new Chart(ctx, {
 type: 'bar',
 data: {
 labels: daily.map(d => d.date),
 datasets: [{
 label: '盈亏 (USDC)',
 data: daily.map(d => d.pnl),
 backgroundColor: daily.map(d => d.pnl >= 0 ? '#00ff88' : '#ff4444')
 }]
 },
 options: { responsive: true, maintainAspectRatio: false }
 });
 }

 // 盈亏分布
 const distribution = await fetchAPI('distribution');
 if (distribution) {
 if (distributionChart) distributionChart.destroy();
 const ctx = document.getElementById('distributionChart').getContext('2d');
 distributionChart = new Chart(ctx, {
 type: 'doughnut',
 data: {
 labels: ['盈利交易', '亏损交易'],
 datasets: [{
 data: [distribution.wins || 0, distribution.losses || 0],
 backgroundColor: ['#00ff88', '#ff4444']
 }]
 },
 options: { responsive: true, maintainAspectRatio: false }
 });
 }

 // 交易记录
 const trades = await fetchAPI('trades');
 if (trades && trades.length) {
 const tbody = document.getElementById('trades-tbody');
 tbody.innerHTML = trades.slice(0, 50).map(t => `
 <tr>
 <td class="text-xs">${t.timestamp?.substring(0, 19).replace('T', ' ')}</td>
 <td class="text-xs" style="max-width:250px; word-break:break-word;">${t.account_name}</td>
 <td class="text-xs">${t.market?.substring(0, 30) || '-'}</td>
 <td class="text-xs">${t.side || '-'}</td>
 <td class="text-xs">$${t.size_usdc?.toFixed(2) || '0'}</td>
 <td class="text-xs ${(t.pnl_usdc || 0) >= 0 ? 'positive' : 'negative'}">${(t.pnl_usdc || 0) >= 0 ? '+' : ''}$${(t.pnl_usdc || 0).toFixed(2)}</td>
 <td><span class="sim-badge">模拟盘</span></td>
 </tr>
 `).join('');
 } else {
 document.getElementById('trades-tbody').innerHTML = '<tr><td colspan="7" class="text-center text-zinc-500">暂无交易记录</td></tr>';
 }

 // 风控状态
 const risk = await fetchAPI('risk');
 if (risk && risk.accounts) {
 const container = document.getElementById('risk-container');
 container.innerHTML = risk.accounts.map(acc => {
 const lossPercent = (acc.today_loss / acc.daily_limit) * 100;
 return `
 <div class="risk-item">
 <span class="risk-name">${acc.name}</span>
 <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(lossPercent, 100)}%"></div></div>
 <span>${acc.today_loss} / ${acc.daily_limit} USDC</span>
 <span class="status-badge status-green">🟢 正常</span>
 </div>
 `;
 }).join('');
 }

 document.getElementById('refresh-time').innerHTML = `最后更新: ${new Date().toLocaleTimeString()} | 模式: ${currentMode === 'sim' ? '模拟账户' : '真实账户'}`;
 }

 // 初始化
 refreshDashboard();
 setInterval(refreshDashboard, 30000);
 </script>
</body>
</html>
