<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrisQuant | 交易账户多维度分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-12 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white flex items-center">
                    IRIS<span class="text-blue-500">QUANT</span> 
                    <span class="ml-4 px-2 py-1 bg-blue-900/30 text-blue-400 text-xs rounded border border-blue-500/30">ANALYTICS v1.0</span>
                </h1>
                <p class="text-gray-500 text-sm mt-1">交易账户多维度分析 & 实时风险监控</p>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Data Source Toggle -->
                <div id="source-toggle" class="flex bg-gray-900 p-1 rounded-lg border border-gray-800 shadow-inner">
                    <button onclick="setDataSource('sim')" id="btn-sim" class="px-4 py-1.5 text-xs font-bold rounded transition-all bg-blue-600/20 text-blue-400 border border-blue-500/30">
                        🔵 模拟账户
                    </button>
                    <button onclick="setDataSource('real')" id="btn-real" class="px-4 py-1.5 text-xs font-bold rounded transition-all text-gray-500 hover:text-gray-300">
                        🔴 真实账户
                    </button>
                </div>
                <div id="account-tabs" class="flex bg-gray-900 p-1 rounded-lg border border-gray-800">
                    <!-- Tabs generated by JS -->
                </div>
            </div>
        </div>

        <!-- Main Analytics Area -->
        <div id="active-account-detail" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div class="col-span-3 text-center py-20 text-gray-600 animate-pulse font-mono">
                INITIALIZING ANALYTICS ENGINE...
            </div>
        </div>

        <!-- Secondary Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-8">
            <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">系统可用性</p>
                <p class="text-green-400 font-mono text-xl">99.9%</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">风险拦截次数</p>
                <p class="text-blue-400 font-mono text-xl">142</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">活跃策略</p>
                <p class="text-white font-mono text-xl">4 Units</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">API 延迟</p>
                <p class="text-yellow-400 font-mono text-xl">42ms</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let activeAccountId = 'BINANCE_MAIN';
        let dataSource = 'sim';

        function setDataSource(source) {
            dataSource = source;
            const btnSim = document.getElementById('btn-sim');
            const btnReal = document.getElementById('btn-real');
            if (source === 'sim') {
                btnSim.className = "px-4 py-1.5 text-xs font-bold rounded transition-all bg-blue-600/20 text-blue-400 border border-blue-500/30";
                btnReal.className = "px-4 py-1.5 text-xs font-bold rounded transition-all text-gray-500 hover:text-gray-300";
            } else {
                btnReal.className = "px-4 py-1.5 text-xs font-bold rounded transition-all bg-red-600/20 text-red-400 border border-red-500/30";
                btnSim.className = "px-4 py-1.5 text-xs font-bold rounded transition-all text-gray-500 hover:text-gray-300";
            }
            updateDashboard();
        }

        function switchAccount(id) {
            activeAccountId = id;
            updateDashboard();
        }

        async function updateDashboard() {
            try {
                const res = await fetch(`${API_BASE}/api/accounts?source=${dataSource}`);
                const accountData = await res.json();
                
                // Update Tabs
                const tabContainer = document.getElementById('account-tabs');
                tabContainer.innerHTML = Object.keys(accountData).map(id => `
                    <button onclick="switchAccount('${id}')" class="px-4 py-1 text-xs font-bold rounded transition-all ${activeAccountId === id ? 'bg-gray-800 text-white shadow-lg' : 'text-gray-600 hover:text-gray-400'}">
                        ${id}
                    </button>
                `).join('');

                const data = accountData[activeAccountId];
                const accountNames = {
                    'BINANCE_MAIN': 'Binance 主账户 (BTC-Rolling)',
                    'OKX_SUB1': 'OKX 子账户 #1 (Contract-Trader)',
                    'POLYMARKET': 'Polymarket 预测账户 (Web3)',
                    'WEATHER_ALPHA': 'Weather Alpha Bot (Oracle)'
                };
                const agentMap = {
                    'BINANCE_MAIN': 'btc-rolling',
                    'OKX_SUB1': 'contract-trader',
                    'POLYMARKET': 'polymarket',
                    'WEATHER_ALPHA': 'weather-alpha-bot'
                };

                const detailContainer = document.getElementById('active-account-detail');
                if (data) {
                    const fullName = accountNames[activeAccountId] || activeAccountId;
                    const riskUsage = data.risk_usage || (data.risk === 'low' ? 20 : data.risk === 'medium' ? 55 : 85);
                    const riskColor = riskUsage > 80 ? 'bg-red-500' : riskUsage > 50 ? 'bg-yellow-500' : 'bg-green-500';

                    detailContainer.innerHTML = `
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl col-span-1 md:col-span-2 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4 opacity-10">
                                <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            </div>
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-1">${fullName}</p>
                                    <p class="text-5xl font-mono text-white font-bold tracking-tighter">$${data.balance.toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-bold uppercase tracking-widest ${data.daily_pnl >= 0 ? 'text-green-500' : 'text-red-500'}">TODAY PnL</p>
                                    <p class="text-2xl font-mono ${data.daily_pnl >= 0 ? 'text-green-500' : 'text-red-500'} font-bold">
                                        ${data.daily_pnl >= 0 ? '+' : ''}${data.daily_pnl} (${data.pnl_pcnt}%)
                                    </p>
                                </div>
                            </div>
                            
                            <div class="mt-12">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">风控阈值占用 (Risk Exposure)</span>
                                    <span class="text-xs font-mono font-bold ${riskUsage > 80 ? 'text-red-400' : 'text-blue-400'}">${riskUsage}%</span>
                                </div>
                                <div class="w-full bg-gray-800/50 rounded-full h-3 overflow-hidden border border-gray-700 p-0.5">
                                    <div class="${riskColor} h-full rounded-full transition-all duration-1000 shadow-lg" style="width: ${riskUsage}%"></div>
                                </div>
                                <div class="flex justify-between mt-3 text-[9px] font-bold text-gray-600 uppercase tracking-widest">
                                    <span>Safe Environment</span>
                                    <span>Warning</span>
                                    <span>Critical Margin</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl flex flex-col justify-center space-y-6">
                             <div>
                                <p class="text-gray-500 text-xs font-bold uppercase mb-4 tracking-widest">策略运行详情</p>
                                <div class="space-y-4">
                                    <div class="flex justify-between border-b border-gray-800 pb-3">
                                        <span class="text-gray-500 text-xs uppercase">执行引擎</span>
                                        <span class="text-blue-400 font-mono text-xs font-bold">${agentMap[activeAccountId] || 'system'}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-gray-800 pb-3">
                                        <span class="text-gray-500 text-xs uppercase">风控评级</span>
                                        <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${
                                            data.risk === 'low' ? 'bg-green-900/20 text-green-400' : 
                                            data.risk === 'medium' ? 'bg-yellow-900/20 text-yellow-400' : 'bg-red-900/20 text-red-400'
                                        }">${data.risk} Risk</span>
                                    </div>
                                    <div class="flex justify-between border-b border-gray-800 pb-3">
                                        <span class="text-gray-500 text-xs uppercase">杠杆状态</span>
                                        <span class="text-gray-300 font-mono text-xs">1.0x (Isolated)</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-500 text-xs uppercase">最后更新</span>
                                        <span class="text-gray-600 font-mono text-[10px]">${new Date().toLocaleTimeString()}</span>
                                    </div>
                                </div>
                             </div>
                             <button class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-white text-xs font-bold rounded-xl transition-all border border-gray-700 shadow-lg">
                                导出分析报告 (.PDF)
                             </button>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
